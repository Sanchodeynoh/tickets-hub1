<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — TICKETS HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="api.js"></script>
  <style>
    :root {
      --purple-deep:   #1a0a2e;
      --purple-mid:    #3d1a6e;
      --purple-bright: #7c3aed;
      --purple-glow:   #a855f7;
      --gold:          #f59e0b;
      --white:         #fafafa;
      --gray-light:    #d1d5db;
      --gray-mid:      #6b7280;
      --dark-card:     #120826;
      --border:        rgba(124,58,237,0.25);
      --success:       #10b981;
      --error:         #ef4444;
      --warning:       #f59e0b;
      --sidebar-w:     240px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0e0620;
      color: var(--white);
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: rgba(18,8,38,0.98);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 200;
      transition: transform 0.3s ease;
    }
    .sidebar-logo {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; letter-spacing: 0.08em;
      color: var(--white); text-decoration: none;
    }
    .logo-text span { color: var(--purple-glow); }
    .logo-badge {
      display: inline-block; margin-top: 0.35rem;
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--gold); border-radius: 4px;
      padding: 0.15rem 0.5rem;
    }

    .sidebar-nav {
      flex: 1; padding: 1rem 0;
      overflow-y: auto;
    }
    .nav-section-label {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gray-mid); padding: 0.75rem 1.5rem 0.35rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1.5rem; cursor: pointer;
      font-size: 0.85rem; font-weight: 500;
      color: var(--gray-mid); border: none;
      background: none; width: 100%; text-align: left;
      transition: all 0.2s; border-left: 3px solid transparent;
      text-decoration: none;
    }
    .nav-item:hover { color: var(--white); background: rgba(124,58,237,0.08); }
    .nav-item.active {
      color: var(--white); background: rgba(124,58,237,0.12);
      border-left-color: var(--purple-bright);
    }
    .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto; background: var(--purple-bright);
      color: #fff; font-size: 0.65rem; font-weight: 700;
      padding: 0.1rem 0.5rem; border-radius: 999px;
    }
    .nav-badge.gold { background: var(--gold); color: #000; }

    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .admin-profile {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .admin-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--purple-bright);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .admin-name { font-size: 0.83rem; font-weight: 600; }
    .admin-role { font-size: 0.7rem; color: var(--gray-mid); }
    .btn-logout {
      width: 100%; padding: 0.55rem;
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--gray-mid);
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* Top bar */
    .topbar {
      height: 64px; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(14,6,32,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .page-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.04em;
    }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .hamburger-admin {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger-admin span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; }

    /* Content */
    .content { padding: 2rem; flex: 1; }

    /* ── TABS ── */
    .tab-nav {
      display: flex; gap: 0.5rem; margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.55rem 1.2rem;
      border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--gray-mid);
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn:hover { border-color: rgba(168,85,247,0.4); color: var(--white); }
    .tab-btn.active {
      background: var(--purple-bright); border-color: var(--purple-bright);
      color: var(--white);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: rgba(18,8,38,0.8);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem 1.5rem;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(168,85,247,0.35); }
    .stat-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 0.5rem; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1; margin-bottom: 0.25rem; }
    .stat-value.purple { color: var(--purple-glow); }
    .stat-value.gold   { color: var(--gold); }
    .stat-value.green  { color: var(--success); }
    .stat-value.white  { color: var(--white); }
    .stat-change { font-size: 0.73rem; color: var(--gray-mid); }
    .stat-change.up   { color: var(--success); }
    .stat-change.warn { color: var(--warning); }

    /* ── ORDERS TABLE ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: 1rem;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 0.04em;
    }

    .search-filter {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
    }
    .search-input {
      padding: 0.55rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; outline: none; width: 220px;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--gray-mid); }
    .search-input:focus { border-color: var(--purple-bright); }
    .filter-select {
      padding: 0.55rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; outline: none; cursor: pointer;
      appearance: none;
    }
    .filter-select option { background: #1a0a2e; }

    .table-wrap {
      background: rgba(18,8,38,0.8);
      border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead tr { border-bottom: 1px solid var(--border); }
    thead th {
      padding: 0.85rem 1.25rem; text-align: left;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gray-mid);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(124,58,237,0.06); }
    td { padding: 1rem 1.25rem; font-size: 0.85rem; vertical-align: middle; }

    .order-id-cell { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--gold); letter-spacing: 0.05em; }
    .buyer-cell .buyer-name { font-weight: 600; }
    .buyer-cell .buyer-email { font-size: 0.73rem; color: var(--gray-mid); }

    .status-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.25rem 0.7rem; border-radius: 999px;
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
    }
    .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .pill-pending  { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .pill-confirmed{ background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .pill-rejected { background: rgba(239,68,68,0.15);  color: var(--error);   border: 1px solid rgba(239,68,68,0.3); }

    .amount-cell { font-weight: 700; }

    .action-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-confirm {
      padding: 0.35rem 0.8rem; border-radius: 6px;
      background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.35);
      color: var(--success); font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .btn-confirm:hover { background: rgba(16,185,129,0.25); }
    .btn-reject {
      padding: 0.35rem 0.8rem; border-radius: 6px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: var(--error); font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .btn-reject:hover { background: rgba(239,68,68,0.2); }
    .btn-view {
      padding: 0.35rem 0.8rem; border-radius: 6px;
      background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.3);
      color: var(--purple-glow); font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .btn-view:hover { background: rgba(124,58,237,0.22); }

    .empty-table {
      text-align: center; padding: 3rem;
      color: var(--gray-mid); font-size: 0.88rem;
    }
    .empty-table .e-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* ── EVENTS PANEL ── */
    .events-grid-admin {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem; margin-bottom: 2rem;
    }
    .event-admin-card {
      background: rgba(18,8,38,0.8);
      border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; transition: border-color 0.2s;
    }
    .event-admin-card:hover { border-color: rgba(168,85,247,0.35); }
    .eac-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem;
    }
    .eac-artist { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.04em; }
    .eac-event  { font-size: 0.75rem; color: var(--purple-glow); font-weight: 600; margin-top: 0.1rem; }
    .eac-status { flex-shrink: 0; }
    .eac-body { padding: 1rem 1.25rem; }
    .eac-meta { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .eac-meta-item { font-size: 0.78rem; color: var(--gray-mid); display: flex; align-items: center; gap: 0.4rem; }
    .eac-tiers { }
    .tier-mini {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .tier-mini:last-child { border-bottom: none; }
    .tier-mini .t-name { color: var(--gray-light); }
    .tier-mini .t-price { font-weight: 700; color: var(--white); }
    .eac-footer {
      padding: 0.85rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 0.5rem;
    }
    .btn-edit-event {
      flex: 1; padding: 0.5rem;
      background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px; color: var(--purple-glow);
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn-edit-event:hover { background: rgba(124,58,237,0.22); }
    .btn-delete-event {
      padding: 0.5rem 0.75rem;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px; color: var(--error);
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn-delete-event:hover { background: rgba(239,68,68,0.18); }

    /* Add Event button */
    .btn-add-event {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      background: var(--purple-bright); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 0 20px rgba(124,58,237,0.35);
    }
    .btn-add-event:hover { background: var(--purple-glow); transform: translateY(-1px); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #120826; border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn { from{opacity:0;transform:scale(0.92);} to{opacity:1;transform:scale(1);} }
    .modal-header {
      padding: 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.04em; }
    .modal-close {
      background: none; border: none; color: var(--gray-mid);
      font-size: 1.5rem; cursor: pointer; line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--white); }
    .modal-body { padding: 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 0.75rem; justify-content: flex-end; }

    /* Form fields */
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--gray-light); margin-bottom: 0.4rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 0.9rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--purple-bright); }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--gray-mid); }
    .form-group select option { background: #1a0a2e; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .tiers-section { margin-bottom: 1.1rem; }
    .tiers-label { font-size: 0.78rem; font-weight: 600; color: var(--gray-light); margin-bottom: 0.75rem; }
    .tier-row-input {
      display: grid; grid-template-columns: 1fr 100px auto;
      gap: 0.5rem; margin-bottom: 0.5rem; align-items: center;
    }
    .tier-row-input input {
      padding: 0.55rem 0.8rem; font-size: 0.83rem;
    }
    .btn-remove-tier {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: var(--error); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-remove-tier:hover { background: rgba(239,68,68,0.2); }
    .btn-add-tier {
      padding: 0.45rem 1rem;
      background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px; color: var(--purple-glow);
      font-size: 0.78rem; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn-add-tier:hover { background: rgba(124,58,237,0.2); }

    .btn-save {
      padding: 0.7rem 1.75rem;
      background: var(--purple-bright); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-save:hover { background: var(--purple-glow); }
    .btn-cancel {
      padding: 0.7rem 1.25rem;
      background: transparent; border: 1px solid var(--border);
      border-radius: 10px; color: var(--gray-mid);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: rgba(168,85,247,0.3); color: var(--white); }

    /* Order detail modal */
    .order-detail-section { margin-bottom: 1.25rem; }
    .ods-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 0.6rem; }
    .ods-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .ods-item { font-size: 0.83rem; }
    .ods-label { color: var(--gray-mid); font-size: 0.72rem; margin-bottom: 0.15rem; }
    .ods-value { font-weight: 600; }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--dark-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.5rem;
      font-size: 0.88rem; font-weight: 600;
      z-index: 999; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transform: translateY(100px); opacity: 0;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      display: flex; align-items: center; gap: 0.75rem;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(16,185,129,0.4); }
    .toast.error   { border-color: rgba(239,68,68,0.4); }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .hamburger-admin { display: flex; }
      .form-row { grid-template-columns: 1fr; }
    }
    @media (max-width:
