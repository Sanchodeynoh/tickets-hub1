<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — TICKETS HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="api.js"></script>
  <style>
    :root {
      --purple-deep:   #1a0a2e;
      --purple-mid:    #3d1a6e;
      --purple-bright: #7c3aed;
      --purple-glow:   #a855f7;
      --gold:          #f59e0b;
      --white:         #fafafa;
      --gray-light:    #d1d5db;
      --gray-mid:      #6b7280;
      --dark-card:     #120826;
      --border:        rgba(124,58,237,0.25);
      --error:         #ef4444;
      --success:       #10b981;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--purple-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 20% 30%, rgba(124,58,237,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 85% 75%, rgba(168,85,247,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: rgba(26,10,46,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.08em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-logo span { color: var(--purple-glow); }
    .nav-signup-link { font-size: 0.85rem; color: var(--gray-mid); text-decoration: none; }
    .nav-signup-link strong { color: var(--purple-glow); }
    .nav-signup-link:hover strong { text-decoration: underline; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .auth-wrapper { width: 100%; max-width: 440px; }

    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--purple-glow);
      margin-bottom: 0.75rem;
    }
    .auth-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .auth-header p { font-size: 0.9rem; color: var(--gray-mid); }

    .auth-card {
      background: rgba(18,8,38,0.8);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .global-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.83rem;
      color: #fca5a5;
      margin-bottom: 1.25rem;
      display: none;
    }
    .global-error.show { display: block; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-light);
      margin-bottom: 0.45rem;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-mid);
      pointer-events: none;
      display: flex; align-items: center;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 0.9rem 0.75rem 2.6rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: var(--gray-mid); }
    .form-group input:focus {
      border-color: var(--purple-bright);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .form-group input.error { border-color: var(--error); }

    .pass-toggle {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-mid);
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .pass-toggle:hover { color: var(--purple-glow); }

    .field-error {
      font-size: 0.73rem;
      color: var(--error);
      margin-top: 0.3rem;
      display: none;
    }
    .field-error.show { display: block; }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -0.75rem;
      margin-bottom: 1.25rem;
    }
    .forgot-row a {
      font-size: 0.78rem;
      color: var(--purple-glow);
      text-decoration: none;
    }
    .forgot-row a:hover { text-decoration: underline; }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .remember-row input[type="checkbox"] {
      accent-color: var(--purple-bright);
      cursor: pointer;
    }
    .remember-row label {
      font-size: 0.82rem;
      color: var(--gray-mid);
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--purple-bright);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 0 30px rgba(124,58,237,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-submit:hover {
      background: var(--purple-glow);
      box-shadow: 0 0 40px rgba(168,85,247,0.5);
      transform: translateY(-1px);
    }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* loading spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 0.75rem; color: var(--gray-mid); }

    .signup-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--gray-mid);
    }
    .signup-link a {
      color: var(--purple-glow);
      font-weight: 600;
      text-decoration: none;
    }
    .signup-link a:hover { text-decoration: underline; }

    /* admin badge on welcome */
    .admin-welcome {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 6px;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 1rem;
      display: none;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">TICKETS<span>HUB</span></a>
    <a href="register.html" class="nav-signup-link">No account? <strong>Sign Up Free</strong></a>
  </nav>

  <main>
    <div class="auth-wrapper">
      <div class="auth-header">
        <div class="tag">🎟️ Welcome Back</div>
        <h1>LOG IN</h1>
        <p>Access your tickets and orders</p>
      </div>

      <div class="auth-card">
        <div class="global-error" id="globalError"></div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" placeholder="you@email.com" autocomplete="email"/>
          </div>
          <div class="field-error" id="emailErr">Please enter a valid email.</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
            <button class="pass-toggle" type="button" onclick="togglePass()" aria-label="Show password">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="passwordErr">Please enter your password.</div>
        </div>

        <div class="forgot-row">
          <a href="#">Forgot password?</a>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="remember"/>
          <label for="remember">Remember me</label>
        </div>

        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
          <span id="btnText">Log In →</span>
          <div class="spinner" id="spinner"></div>
        </button>

        <div class="divider"><span>or</span></div>
        <div class="signup-link">Don't have an account? <a href="register.html">Sign Up Free</a></div>
      </div>
    </div>
  </main>

  <script>
    // Pre-fill if coming from register
    const savedEmail = sessionStorage.getItem('th_last_email');
    if (savedEmail) document.getElementById('email').value = savedEmail;

    function togglePass() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.pass-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
      } else {
        input.type = 'password';
        btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      }
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errBox   = document.getElementById('globalError');
      errBox.classList.remove('show');

      let valid = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailErr').classList.add('show');
        document.getElementById('email').classList.add('error');
        valid = false;
      } else {
        document.getElementById('emailErr').classList.remove('show');
        document.getElementById('email').classList.remove('error');
      }
      if (!password) {
        document.getElementById('passwordErr').classList.add('show');
        document.getElementById('password').classList.add('error');
        valid = false;
      } else {
        document.getElementById('passwordErr').classList.remove('show');
        document.getElementById('password').classList.remove('error');
      }
      if (!valid) return;

      // Show loading
      document.getElementById('btnText').textContent = 'Logging in...';
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('loginBtn').disabled = true;

      try {
        const data = await Auth.login(email, password);
        if (data.user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch (err) {
        errBox.textContent = err.message || 'Incorrect email or password.';
        errBox.classList.add('show');
        document.getElementById('btnText').textContent = 'Log In →';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
